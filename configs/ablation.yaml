# Ablation Study Configs for Diffusion Policy

# ============================================================
# Study 1: Action Chunk Size
# ============================================================
ablation_action_chunk:
  experiment_name: "ablation_action_chunk"
  action_chunk_size: [8, 16, 32]
  obs_horizon: 2
  hidden_dim: 256
  num_timesteps: 100
  batch_size: 32
  num_epochs: 100
  lr: 0.0001

# ============================================================
# Study 2: Observation Horizon (history length)
# ============================================================
ablation_obs_horizon:
  experiment_name: "ablation_obs_horizon"
  action_chunk_size: 16
  obs_horizon: [1, 2, 4, 8]
  hidden_dim: 256
  num_timesteps: 100
  batch_size: 32
  num_epochs: 100
  lr: 0.0001

# ============================================================
# Study 3: Number of Demonstrations
# ============================================================
ablation_num_demos:
  experiment_name: "ablation_num_demos"
  action_chunk_size: 16
  obs_horizon: 2
  num_demos: [50, 100, 250, 500]
  hidden_dim: 256
  num_timesteps: 100
  batch_size: 32
  num_epochs: 100
  lr: 0.0001

# ============================================================
# Study 4: Noise Schedule
# ============================================================
ablation_noise_schedule:
  experiment_name: "ablation_noise_schedule"
  action_chunk_size: 16
  obs_horizon: 2
  beta_schedule: ["linear", "cosine"]
  num_timesteps: [50, 100, 200]
  hidden_dim: 256
  batch_size: 32
  num_epochs: 100
  lr: 0.0001

# ============================================================
# Study 5: Sampling Strategy (DDPM vs DDIM)
# ============================================================
ablation_sampling:
  experiment_name: "ablation_sampling"
  action_chunk_size: 16
  obs_horizon: 2
  sampling_strategy: ["ddpm", "ddim"]
  ddim_num_steps: [5, 10, 20, 50]
  hidden_dim: 256
  num_timesteps: 100
  batch_size: 32
  num_epochs: 100
  lr: 0.0001

# ============================================================
# Baseline configs
# ============================================================
baseline_bc:
  experiment_name: "baseline_bc"
  model_type: "behavioral_cloning"
  hidden_dim: 256
  num_epochs: 100
  lr: 0.001
  batch_size: 32

baseline_dagger:
  experiment_name: "baseline_dagger"
  model_type: "dagger"
  hidden_dim: 256
  num_epochs: 100
  lr: 0.001
  batch_size: 32
  dagger_iters: 5
